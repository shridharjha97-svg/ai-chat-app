<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Chat Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <!-- Three.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

  <header class="header">
    <div class="left-header">
      <div id="menuBtn" class="menu-btn">☰</div>
      <div class="title-area">
        <h1>AI Chat</h1>
        <p>Your Smart Assistant</p>
      </div>
    </div>
    <div class="theme-btn" id="themeBtn" onclick="toggleTheme()"></div>
  </header>

  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3>CHATS</h3>
        <ul class="menu-list"></ul>
      </div>
      <div class="sidebar-section">
        <h3>SETTINGS</h3>
        <ul class="menu-list settings-list">
          <li onclick="toggleTheme()">🌗 Toggle Theme</li>
          <li onclick="clearHistory()">🗑 Clear History</li>
        </ul>
      </div>
      <div class="user-section" id="userSection"></div>
    </aside>

    <section class="chat-section" id="chatSection">
      <!-- Three.js particles canvas -->
      <canvas id="particlesCanvas"></canvas>
      <!-- Parallax depth layers -->
      <div class="bg-3d" id="bgLayer1"></div>
      <div class="bg-3d-layer2" id="bgLayer2"></div>
      <div class="chat-box" id="chatBox"></div>
      <div class="input-area">
        <input id="userInput" type="text" placeholder="Type your message..." autocomplete="off" />
        <button id="sendBtn">Send</button>
        <button id="micBtn">🎤</button>
      </div>
    </section>
  </div>

  <!-- VOICE SCREEN -->
  <div id="voiceScreen" class="voice-screen">
    <div class="voice-container">
      <!-- Three.js sphere replaces ai-ball -->
      <canvas id="voiceSphereCanvas"></canvas>
      <div class="voice-waves idle" id="voiceWaves">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <p class="voice-text" id="voiceStatusText">Tap the mic to speak</p>
      <p class="voice-transcript" id="voiceTranscript"></p>
      <button id="closeVoice">Close</button>
    </div>
  </div>

  <!-- PROFILE SCREEN -->
  <div class="profile-screen" id="profileScreen">
    <div class="profile-overlay" id="profileOverlay"></div>
    <div class="profile-panel">
      <div class="profile-content">
        <div class="profile-header">
          <h2>My Profile</h2>
          <button class="close-profile" id="closeProfile">✕</button>
        </div>
        <div class="profile-avatar-big">
          <div class="avatar-circle" id="bigAvatar" onclick="document.getElementById('avatarInput').click()">
            <span id="bigAvatarText">?</span>
            <div class="avatar-upload-btn">Change</div>
          </div>
          <input type="file" id="avatarInput" accept="image/*" />
          <div class="profile-name-display" id="profileNameDisplay">—</div>
          <div class="profile-email-display" id="profileEmailDisplay">—</div>
        </div>
        <div class="profile-msg" id="profileMsg"></div>
        <div class="field-card">
          <h4>Personal Info</h4>
          <div class="field-row">
            <label>Display Name</label>
            <input type="text" id="editName" placeholder="Your name" />
          </div>
          <div class="field-row">
            <label>Email</label>
            <input type="email" id="editEmail" placeholder="your@email.com" disabled />
          </div>
        </div>
        <div class="field-card">
          <h4>Change Password</h4>
          <div class="field-row">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Min 6 characters" />
          </div>
          <div class="field-row">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat password" />
          </div>
        </div>
        <button class="btn-save" id="saveBtn">Save Changes</button>
        <div class="danger-zone">
          <h4>⚠ Danger Zone</h4>
          <button class="btn-danger" id="deleteAccountBtn">🗑 Delete My Account</button>
        </div>
        <button class="btn-logout" id="logoutBtn">🚪 Sign Out</button>
      </div>
    </div>
  </div>

  <script src="script.js" type="module"></script>
</body>

</html>
