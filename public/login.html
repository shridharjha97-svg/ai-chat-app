<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <!-- Three.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="login-page">

<!-- Three.js particles canvas for login background -->
<canvas id="loginParticlesCanvas"></canvas>

<div class="login-card" id="loginCard">
  <div class="logo-orb"></div>
  <h1>AI Chat</h1>
  <p class="login-subtitle">Your Smart Assistant — Sign in to continue</p>

  <div class="login-msg" id="msgBox"></div>

  <div class="user-bar" id="userBar">
    <img id="userPhoto" src="" alt="" onerror="this.style.display='none'"/>
    <div>
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
    </div>
  </div>

  <div class="input-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="you@example.com"/>
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••"/>
  </div>

  <button class="btn-primary" id="emailLoginBtn">Sign In</button>
  <button class="btn-secondary" id="emailSignupBtn">Create Account</button>

  <div class="login-divider">or</div>

  <button class="btn-google" id="googleLoginBtn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <p class="small-link"><a id="forgotPasswordLink">Forgot password?</a></p>
</div>

<script src="login.js" type="module"></script>
</body>
</html>
